    <!-- Quan sát: h1 và h2 đều dùng .title nhưng màu có giống nhau không? Tại sao?

    class và base.css sẽ được áp dụng còn với h2 có class .title mặc mặc dù css có định
    nghĩa cho màu h2 nhưng class sẽ thắng h2 vì class có độ ưu tiên hơn các thẻ  .-->
    <body>
        <h1 class="title" id="main">HOME PAGE</h1>

        <h2 class="title">Gioi thieu he thong</h2>

        <h3 class="section">Các khoa hoc noi bat</h3>
